<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dz Complex RP — مقابلة الانضمام</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --bg-deep:#060f1f;
  --bg-panel:#0c1c37;
  --bg-panel-2:#11284d;
  --bg-panel-3:#16305c;
  --accent:#2f6fed;
  --accent-2:#57c7ff;
  --success:#2fd499;
  --danger:#ff5470;
  --warning:#ffb648;
  --text:#eaf2ff;
  --text-muted:#8fa6c9;
  --border:rgba(87,199,255,0.16);
  --font-display:'Cairo',sans-serif;
  --font-body:'Cairo',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(47,111,237,0.25), transparent 60%),
    radial-gradient(1000px 500px at 100% 10%, rgba(87,199,255,0.12), transparent 55%),
    var(--bg-deep);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  line-height:1.6;
}
[dir="ltr"] body, .ltr{direction:ltr;}
#app{min-height:100vh;display:flex;flex-direction:column;}

/* ===== TOP BAR ===== */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;border-bottom:1px solid var(--border);
  background:rgba(6,15,31,0.6);backdrop-filter:blur(6px);
  position:sticky;top:0;z-index:50;
}
.brand{display:flex;align-items:center;gap:12px;}
.brand .crest{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(145deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:700;color:#04101f;font-size:15px;
  box-shadow:0 0 22px rgba(87,199,255,0.45);
  flex-shrink:0;
}
.brand-text b{font-size:17px;letter-spacing:0.5px;font-weight:800;}
.brand-text span{display:block;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:1.5px;text-transform:uppercase;}
.top-actions{display:flex;align-items:center;gap:10px;}
.lang-switch{display:flex;background:var(--bg-panel);border:1px solid var(--border);border-radius:999px;padding:3px;gap:2px;}
.lang-btn{
  border:none;background:transparent;color:var(--text-muted);font-family:var(--font-mono);
  font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;cursor:pointer;transition:.2s;
}
.lang-btn.active{background:var(--accent);color:#04101f;}
.icon-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg-panel);color:var(--text-muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s;
}
.icon-btn:hover{color:var(--accent-2);border-color:var(--accent-2);}

/* ===== MAIN ===== */
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 20px 80px;}
.screen{width:100%;max-width:760px;animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ===== STEPPER (signature element) ===== */
.stepper{display:flex;align-items:center;justify-content:center;gap:0;margin:0 auto 36px;max-width:620px;}
.step{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;position:relative;}
.step .node{
  width:34px;height:34px;border-radius:50%;border:2px solid var(--border);
  background:var(--bg-panel);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--text-muted);
  transition:.3s;z-index:2;
}
.step .label{font-size:11px;color:var(--text-muted);font-weight:700;white-space:nowrap;}
.step.active .node{border-color:var(--accent-2);color:var(--accent-2);box-shadow:0 0 14px rgba(87,199,255,0.5);}
.step.done .node{background:var(--success);border-color:var(--success);color:#04101f;}
.step.active .label{color:var(--accent-2);}
.step.done .label{color:var(--success);}
.step:not(:last-child)::after{
  content:"";position:absolute;top:17px;left:calc(-50% + 17px);width:calc(100% - 34px);height:2px;
  background:var(--border);z-index:1;
}
[dir="rtl"] .step:not(:last-child)::after{left:auto;right:calc(-50% + 17px);}
.step.done:not(:last-child)::after{background:var(--success);}

/* ===== CARD ===== */
.card{
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-panel-2));
  border:1px solid var(--border);border-radius:18px;padding:32px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}
.hero-card{text-align:center;padding:56px 32px;}
.hero-crest{
  width:88px;height:88px;border-radius:22px;margin:0 auto 22px;
  background:linear-gradient(145deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:800;font-size:28px;color:#04101f;
  box-shadow:0 0 40px rgba(87,199,255,0.5);
}
h1.title{font-size:34px;font-weight:900;margin:0 0 8px;letter-spacing:.3px;}
.subtitle{color:var(--text-muted);font-size:15px;margin:0 0 30px;}
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent-2);font-weight:700;margin-bottom:10px;}
h2.section-title{font-size:22px;font-weight:800;margin:0 0 6px;}
.section-sub{color:var(--text-muted);font-size:14px;margin:0 0 24px;}

/* ===== BUTTONS ===== */
.btn{
  border:none;border-radius:12px;padding:14px 26px;font-family:var(--font-body);
  font-weight:700;font-size:15px;cursor:pointer;transition:.2s;display:inline-flex;
  align-items:center;justify-content:center;gap:8px;
}
.btn-primary{background:linear-gradient(120deg,var(--accent),var(--accent-2));color:#04101f;box-shadow:0 10px 26px rgba(47,111,237,0.4);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(47,111,237,0.55);}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-ghost:hover{border-color:var(--accent-2);color:var(--accent-2);}
.btn-danger{background:var(--danger);color:#2a0510;}
.btn-block{width:100%;}
.btn-sm{padding:9px 16px;font-size:13px;border-radius:9px;}

/* ===== FORM ELEMENTS ===== */
label.field-label{display:block;font-size:13px;color:var(--text-muted);font-weight:700;margin:0 0 8px;}
input[type="text"],input[type="date"],input[type="url"],input[type="password"],textarea,select{
  width:100%;background:var(--bg-deep);border:1px solid var(--border);border-radius:10px;
  padding:13px 14px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:.2s;
}
textarea{resize:vertical;min-height:90px;font-family:var(--font-mono);font-size:13px;}
input:focus,textarea:focus,select:focus{border-color:var(--accent-2);box-shadow:0 0 0 3px rgba(87,199,255,0.15);}
.field{margin-bottom:18px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media (max-width:600px){.grid-2{grid-template-columns:1fr;}}

/* ===== RULES ===== */
.rules-box{
  background:var(--bg-deep);border:1px solid var(--border);border-radius:14px;padding:22px 24px;
  max-height:340px;overflow-y:auto;font-size:14.5px;color:#cfe0f7;white-space:pre-wrap;margin-bottom:22px;
}
.rules-box::-webkit-scrollbar{width:7px;}
.rules-box::-webkit-scrollbar-thumb{background:var(--bg-panel-3);border-radius:10px;}
.agree-row{display:flex;align-items:center;gap:12px;background:var(--bg-deep);border:1px solid var(--border);
  border-radius:12px;padding:16px 18px;margin-bottom:22px;cursor:pointer;}
.agree-row input{width:19px;height:19px;accent-color:var(--accent-2);flex-shrink:0;}
.warn-banner{background:rgba(255,84,112,0.1);border:1px solid rgba(255,84,112,0.4);color:#ffc2ce;
  border-radius:12px;padding:14px 16px;font-size:13.5px;margin-bottom:20px;}
.lock-banner{background:rgba(255,182,72,0.1);border:1px solid rgba(255,182,72,0.4);color:var(--warning);
  border-radius:12px;padding:16px 18px;font-size:14px;text-align:center;font-family:var(--font-mono);}

/* ===== QUIZ ===== */
.quiz-header{position:sticky;top:76px;z-index:30;background:var(--bg-deep);border:1px solid var(--border);
  border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;gap:14px;flex-wrap:wrap;}
.timer{font-family:var(--font-mono);font-size:26px;font-weight:700;color:var(--accent-2);letter-spacing:1px;}
.timer.low{color:var(--danger);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.progress-track{flex:1;min-width:120px;height:6px;background:var(--bg-panel-3);border-radius:6px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .3s;}
.skip-token{font-family:var(--font-mono);font-size:12px;color:var(--warning);border:1px solid rgba(255,182,72,0.4);
  padding:6px 10px;border-radius:8px;background:rgba(255,182,72,0.08);}

.q-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:16px;}
.q-num{font-family:var(--font-mono);font-size:12px;color:var(--accent-2);font-weight:700;margin-bottom:6px;}
.q-text{font-size:16px;font-weight:700;margin-bottom:16px;}
.opt-row{display:flex;align-items:center;gap:12px;background:var(--bg-deep);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;margin-bottom:9px;cursor:pointer;transition:.15s;}
.opt-row:hover{border-color:var(--accent-2);}
.opt-row.selected{border-color:var(--accent-2);background:rgba(87,199,255,0.08);}
.opt-row input{accent-color:var(--accent-2);width:17px;height:17px;flex-shrink:0;}
.skip-btn{font-size:12px;color:var(--warning);background:none;border:1px dashed rgba(255,182,72,0.5);
  border-radius:8px;padding:6px 12px;cursor:pointer;margin-top:6px;}
.skip-btn:disabled{opacity:.3;cursor:not-allowed;}
.q-card.skipped{opacity:.55;}

/* ===== RESULT ===== */
.result-score{font-family:var(--font-mono);font-size:64px;font-weight:800;text-align:center;margin:6px 0 4px;}
.result-score.pass{color:var(--success);}
.result-score.fail{color:var(--danger);}
.result-tag{text-align:center;font-weight:800;font-size:18px;letter-spacing:1px;margin-bottom:26px;}
.result-tag.pass{color:var(--success);}
.result-tag.fail{color:var(--danger);}

/* ===== ADMIN ===== */
.admin-tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.admin-tab{background:var(--bg-deep);border:1px solid var(--border);color:var(--text-muted);
  padding:9px 16px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;}
.admin-tab.active{border-color:var(--accent-2);color:var(--accent-2);background:rgba(87,199,255,0.08);}
.q-admin-item{background:var(--bg-deep);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.q-admin-item .opts-mini{font-size:12.5px;color:var(--text-muted);margin-top:6px;}
.q-admin-item .opts-mini b{color:var(--success);}
.row-between{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.tag-pill{display:inline-block;background:var(--bg-panel-3);border-radius:999px;padding:3px 10px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);}
.divider{height:1px;background:var(--border);margin:26px 0;}
.helper-text{font-size:12.5px;color:var(--text-muted);margin-top:-10px;margin-bottom:16px;}
.footer-note{text-align:center;color:var(--text-muted);font-size:12px;margin-top:30px;font-family:var(--font-mono);}
.opt-input-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.opt-input-row input[type="radio"]{accent-color:var(--success);width:18px;height:18px;flex-shrink:0;}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--bg-panel-3);
  border:1px solid var(--accent-2);color:var(--text);padding:12px 22px;border-radius:12px;font-size:13.5px;
  z-index:100;box-shadow:0 10px 30px rgba(0,0,0,0.4);animation:fadeIn .25s ease;}
</style>

const DEFAULT_RP_RULES = {
  ar:`1. Mass RP (بيئة المدينة العامة)
يجب احترام أن المدينة مأهولة بملايين السكان. الأماكن العامة مثل المستشفيات ومراكز الشرطة لها هيبة ولا يجوز التصرف فيها كأنها فارغة.

2. Fast-RP / Skip RP (اختصار السيناريو)
يُمنع حرق الأحداث أو تسريع القصة بطرق غير واقعية، مثل التعرف على هوية شخص مقنع بمجرد النظر إلى لون سيارته أو ملابسه.

3. Powergaming (القوة الخارقة)
يُمنع القيام بأفعال مستحيلة في الحياة الواقعية، مثل القفز بالسيارة من جسر والنهوض كأن شيئاً لم يكن، أو تجاهل الأضرار الجسدية.

4. RDM / Free-Kill (القتل العشوائي)
يُمنع منعاً باتاً قتل أو إطلاق النار على أي لاعب أو مواطن دون وجود سبب قصة (RP) قوي وتحذير مسبق.

5. VDM / Car-Kill (الدهس العمد)
يُمنع استخدام المركبات كأداة لدهس اللاعبين أو قتلهم، سواء كان ذلك بسبق إصرار أو بدون سبب.

6. Drive-by (الإطلاق من المركبة)
يُمنع إطلاق النار من داخل المركبات أثناء القيادة إلا في الحالات الاستثنائية التي تحددها إدارة السيرفر.

7. Revenge Killing / RK (الانتقام بعد الموت)
يُمنع العودة للانتقام من الشخص الذي قام بقتلك في السيناريو السابق، لأن شخصيتك نسيت ما حدث.

8. Metagaming (استخدام معلومات خارجية)
يُمنع استخدام أي معلومات حصلت عليها من خارج اللعبة (مثل الديسكورد أو البث المباشر) وتطبيقها داخل السيرفر.

9. Bunny Hopping / Bunny Jump (القفز المتكرر)
يُمنع القفز المتتالي أثناء الركض بهدف التحرك بشكل أسرع أو الهروب، لأنها حركة غير واقعية.

10. Force RP (إجبار السيناريو)
يُمنع فرض سيناريو معين على لاعب آخر وإجباره على الخسارة أو الانصياع دون إعطائه فرصة للرد والتمثيل.

11. Character Consistency (تناقض الشخصية)
يجب أن تلتزم بتوجه شخصيتك؛ يُمنع القيام بأفعال تخالف دورك تماماً (مثل شرطي يسرق البنوك علناً بدون بناء قصة فساد مسبقة ومعتمدة).

12. Playing to Win / Win-RP (حب الفوز)
يُمنع اللعب فقط من أجل الفوز بالسيناريو ومقاومة الخسارة بأي ثمن. الرول بلاي هو متعة متبادلة (ربح وخسارة).

13. Fear RP (قاعدة الخوف)
يجب أن تجسد الخوف على حياتك في اللعبة تماماً كالواقع؛ إذا تم تهديدك بسلاح وأنت أعزل، يجب عليك الاستسلام فوراً.

14. Fair Play (اللعب العادل)
يجب الالتزام بالروح الرياضية وعدم استغلال الأعداد الضخمة أو الثغرات لإفساد متعة الطرف الآخر.

15. Mixing (خلط الشخصيات)
يُمنع خلط حياتك الحقيقية وشخصيتك الواقعية بأحداث ومجريات السيرفر والتمثيل.

16. Cop Baiting (استفزاز الشرطة)
يُمنع استدراج الشرطة أو التحرش بهم وملاحقتهم بلا سبب منطقي لمجرد بدء مطاردة أو قتال.

17. Pain RP (تمثيل الألم)
يجب التفاعل وتمثيل الألم عند تعرضك لحادث سيارة، ضرب، أو صعق كهربائي، وعدم التصرف كأنك لا تشعر بشيء.

18. Exploiting / Use-bug (استغلال الثغرات)
يُمنع منعاً باتاً استغلال أخطاء السيرفر (Glitch) أو الكود البرمجي للحصول على ميزات غير عادلة (عقوبتها الباند الفوري).

19. Stream Sniping (سرقة البث)
يُمنع الدخول لبث مباشر لأحد اللاعبين لمعرفة موقعه أو خططه ومباغتته داخل اللعبة.

20. Combat Logging / ALT+F4 (الهروب من السيناريو)
يُمنع الخروج من السيرفر أو إغلاق اللعبة أثناء سيناريو قائم (مثل الاعتقال أو القتال) للهروب من العواقب.

21. OOC / HRP (خارج النطاق)
يُمنع التحدث بصوتك الحقيقي عن أمور خارج اللعبة أثناء السيناريوهات، ويجب استخدام المايك فقط للكلام داخل الشخصية (IC).

22. Character Kill / Mort RP (الموت الدائم)
في حال تفعيل هذه القاعدة، تموت شخصيتك نهائياً وتفقد ممتلكاتها ويتحتم عليك البدء بشخصية وقصة جديدة تماماً.

23. NLR / New Life Rule (قانون الحياة الجديدة)
عند دخولك في غيبوبة (Coma) والاستيقاظ في المستشفى، يجب عليك نسيان السيناريو الأخير الذي تسبب في موتك بالكامل.

24. Third-Partying / Mix-scene (التدخل كطرف ثالث)
يُمنع التدخل في مشهد أو قتال قائم بين مجموعتين (مثلاً: عصابتين تتقاتلان، يُمنع على عصابة ثالثة الدخول فجأة وسط المعركة).

25. Power-Authorization / Corrupt RP (حدود الفساد)
يُمنع على موظفي الدولة (شرطة، مسعفين، قضاة) ممارسة الفساد أو التعاون مع العصابات دون قصة فساد معتمدة مسبقاً من الإدارة.

26. Safe Zones (المناطق الآمنة)
يُمنع منعاً باتاً القيام بأي أعمال إجرامية (خطف، قتل، سرقة، مشاجرات) داخل أو حول المناطق الآمنة المحددة في السيرفر (مثل: المستشفى الرئيسي، مركز الشرطة، محلات الملابس، ونقاط رسبون اللاعبين الجدد).

27. Green Zone / Red Zone (المناطق الخضراء والحمراء)
Green Zone: مناطق يُمنع فيها القتال تماماً لحماية اللاعبين.
Red Zone: مناطق النزاع حيث يُسمح فيها بالقتال وإطلاق النار.

28. Body Dumping (إخفاء الجثث)
يُمنع رمي جثة لاعب آخر في مكان مستحيل الوصول إليه (مثل أعماق المحيط أو فوق جبل شاهق) بهدف منعه من تلقي الإسعاف أو إجباره على نسيان السيناريو (NLR) وضياع حقه.

29. Vehicle Ramming (صدم السيارات بالسيارات)
يُمنع استخدام السيارات لصدم سيارات أخرى بشكل متكرر وجنوني، ويجب الحفاظ على سلامة المركبة قدر الإمكان لواقعية القيادة.

30. Backseating / Admin-RP (تقمص دور الإدارة)
يُمنع على اللاعبين العاديين إيقاف السيناريو ومحاسبة الآخرين على أخطائهم في القوانين أثناء اللعب. إذا رأيت مخالفة، أكمل السيناريو ثم توجه لفتح تذكرة (Ticket) في الديسكورد ودع الإدارة تتصرف.

31. Looting / Ninja Looting (سرقة الجثث العشوائية)
يُمنع سرقة أسلحة أو أغراض لاعبين آخرين سقطوا في غيبوبة إذا لم تكن أنت طرفاً أساسياً في السيناريو أو القتال الذي دار ضدهم.

32. Hostage Rules (قوانين الرهائن)
يُمنع استخدام الأصدقاء أو أعضاء العصابة أنفسهم كـ "رهائن وهميين" في عمليات السطو (مثل سرقة البنوك) للاتفاق مع الشرطة وتسهيل الهروب؛ يجب أن يكون الرهينة لاعباً مدنياً حقيقياً.`,
  fr:``,
  en:``
};

/* ============================= STORAGE HELPERS ============================= */
async function storageGet(key){
  try{
    const r = await window.storage.get(key, true);
    return r ? r.value : null;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  try{ await window.storage.set(key, value, true); return true; }
  catch(e){ console.error('storage set failed', e); return false; }
}
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function initConfig(){

  if(raw){

  let needsSave = false;
  if(!config){

    config = {

      rpRules: JSON.parse(JSON.stringify(DEFAULT_RP_RULES)),
      serverTerms: JSON.parse(JSON.stringify(DEFAULT_SERVER_TERMS)),

      passMark: 17,
      totalTimeSeconds: 150,
      maxAttempts: 3,
      cooldownHours: 24,
      adminPassHash: hash,
      version: CONFIG_VERSION
    };
    needsSave = true;
  }
  // backfill any missing fields (also migrates configs saved before this update)
  if(config.passMark===undefined){ config.passMark = 17; needsSave = true; }
  if(config.totalTimeSeconds===undefined){ config.totalTimeSeconds = 150; needsSave = true; }
  if(config.maxAttempts===undefined){ config.maxAttempts = 3; needsSave = true; }
  if(config.cooldownHours===undefined){ config.cooldownHours = 24; needsSave = true; }
  if(!config.webhookUrl){ config.webhookUrl = DEFAULT_WEBHOOK_URL; needsSave = true; }
  if(!config.logoUrl){ config.logoUrl = DEFAULT_LOGO_URL; needsSave = true; }
  if(!config.rpRules){ config.rpRules = JSON.parse(JSON.stringify(DEFAULT_RP_RULES)); needsSave = true; }
  if(!config.serverTerms){ config.serverTerms = JSON.parse(JSON.stringify(DEFAULT_SERVER_TERMS)); needsSave = true; }
  if(!config.version || config.version < CONFIG_VERSION){
    config.totalTimeSeconds = 150; // requested: 150 seconds for the new rule-based question set
    config.version = CONFIG_VERSION;
    needsSave = true;
  }
  if(needsSave) await storageSet('config', JSON.stringify(config));
}

async function initQuestions(){
  let verRaw = await storageGet('questions_version');
  let ver = verRaw ? parseInt(verRaw,10) : 0;
  let raw = await storageGet('questions');
  if(raw){
    try{ questions = JSON.parse(raw); }catch(e){ questions = []; }
  }
  if(!questions || !questions.length || ver < QUESTIONS_VERSION){
    questions = DEFAULT_QUESTIONS;
    await storageSet('questions', JSON.stringify(questions));
    await storageSet('questions_version', String(QUESTIONS_VERSION));
  }
}

async function saveConfig(){ await storageSet('config', JSON.stringify(config)); }

async function getAttempt(id){
  const raw = await storageGet('attempt:'+id);
  if(!raw) return {failCount:0, lockedUntil:0};
  try{ return JSON.parse(raw); }catch(e){ return {failCount:0, lockedUntil:0}; }
}
async function setAttempt(id, data){ await storageSet('attempt:'+id, JSON.stringify(data)); }

async function listAllAttempts(){
  try{
    const r = await window.storage.list('attempt:', true);
    if(!r || !r.keys) return [];
    const out = [];
    for(const k of r.keys){
      const raw = await storageGet(k);
      if(raw){
        try{ out.push({key:k, data: JSON.parse(raw)}); }catch(e){}
      }
    }
    return out;
  }catch(e){ return []; }
}

/* ============================= UTIL ============================= */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function fmtTime(sec){
  const m = Math.floor(sec/60).toString().padStart(2,'0');
  const s = Math.floor(sec%60).toString().padStart(2,'0');
  return m+':'+s;
}
function esc(s){
  return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg){
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2200);
}

/* ============================= RENDER DISPATCH ============================= */
async function render(){
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('dir', T[lang].dir);
  let body = '';
  if(screen === 'home') body = renderHome();
  else if(screen === 'rpRules') body = renderRpRulesPage();
  else if(screen === 'serverTerms') body = renderServerTermsPage();
  else if(screen === 'rules') body = renderRules();
  else if(screen === 'quiz') body = renderQuiz();
  else if(screen === 'result') body = renderResult();
  else if(screen === 'info') body = renderInfoForm();
  else if(screen === 'adminLogin') body = renderAdminLogin();
  else if(screen === 'adminPanel') body = renderAdminPanel();

  app.innerHTML = renderTopbar() + `<main>${body}</main>`;
  attachGlobalHandlers();
  await attachScreenHandlers();
}

/* ============================= HANDLERS ============================= */
function attachGlobalHandlers(){
  document.querySelectorAll('.lang-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ lang = btn.dataset.lang; render(); });
  });
  const gear = document.getElementById('adminGearBtn');
  if(gear) gear.addEventListener('click', ()=>{
    if(screen==='quiz') return; // don't allow leaving mid-quiz via gear
    screen = adminAuthed ? 'adminPanel' : 'adminLogin';
    render();
  });
}

async function attachScreenHandlers(){
  if(screen === 'home'){
    document.getElementById('startBtn').addEventListener('click', ()=>{ screen='rules'; render(); });
    document.getElementById('rpRulesBtn').addEventListener('click', ()=>{ screen='rpRules'; render(); });
    document.getElementById('serverTermsBtn').addEventListener('click', ()=>{ screen='serverTerms'; render(); });
  }

  else if(screen === 'rpRules' || screen === 'serverTerms'){
    document.getElementById('infoPageBackBtn').addEventListener('click', ()=>{ screen='home'; render(); });
  }

  else if(screen === 'rules'){
    const discordInput = document.getElementById('discordIdInput');
    const agreeCheck = document.getElementById('agreeCheck');
    const startBtn = document.getElementById('agreeStartBtn');
    const lockArea = document.getElementById('lockArea');

    function refreshBtn(){
      startBtn.disabled = !(agreeCheck.checked && discordInput.value.trim().length>3);
    }
    discordInput.addEventListener('input', ()=>{ discordId = discordInput.value.trim(); refreshBtn(); });
    agreeCheck.addEventListener('change', refreshBtn);

    startBtn.addEventListener('click', async ()=>{
      discordId = discordInput.value.trim();
      if(!discordId){ showToast(t('need_discord_id')); return; }
      const att = await getAttempt(discordId);
      if(att.passed){
        lockArea.innerHTML = `<div class="lock-banner">✅ <b>${esc(t('already_applied_title'))}</b><br>${esc(t('already_applied_msg'))}</div>`;
        startBtn.style.display='none';
        agreeCheck.closest('.agree-row').style.display='none';
        return;
      }
      const now = Date.now();
      if(att.lockedUntil && att.lockedUntil > now){
        const remain = att.lockedUntil - now;
        const h = Math.floor(remain/3600000), m = Math.floor((remain%3600000)/60000);
        lockArea.innerHTML = `<div class="lock-banner">⏳ ${esc(t('locked_msg'))} ${h}${lang==='ar'?'س':'h'} ${m}${lang==='ar'?'د':'m'} ${esc(t('locked_msg2'))}</div>`;
        startBtn.style.display='none';
        return;
      }
      await beginQuiz();
    });
  }

  else if(screen === 'quiz'){
    document.querySelectorAll('.q-card input[type=radio]').forEach(r=>{
      r.addEventListener('change', (e)=>{
        const card = e.target.closest('.q-card');
        const qid = card.dataset.qid;
        selected[qid] = parseInt(e.target.value,10);
        if(skippedId === qid){ skippedId = null; skipUsed = false; }
        if(allQuestionsAnswered()){ finishQuiz('normal'); return; }
        render();
      });
    });
    document.querySelectorAll('.skip-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const qid = e.target.dataset.qid;
        if(skippedId === qid){ skippedId = null; skipUsed = false; }
        else if(!skipUsed){ skippedId = qid; skipUsed = true; delete selected[qid]; }
        if(allQuestionsAnswered()){ finishQuiz('normal'); return; }
        render();
      });
    });
    document.getElementById('submitQuizBtn').addEventListener('click', ()=>{
      if(!confirm(t('confirm_submit'))) return;
      finishQuiz('normal');
    });
  }

  else if(screen === 'result'){
    if(lastPass){
      document.getElementById('toInfoBtn').addEventListener('click', ()=>{ screen='info'; render(); });
    } else {
      const att = await getAttempt(discordId);
      const now = Date.now();
      const area = document.getElementById('retryArea');
      if(att.lockedUntil && att.lockedUntil > now){
        const remain = att.lockedUntil - now;
        const h = Math.floor(remain/3600000), m = Math.floor((remain%3600000)/60000);
        area.innerHTML = `<div class="lock-banner">⏳ ${esc(t('locked_msg'))} ${h}${lang==='ar'?'س':'h'} ${m}${lang==='ar'?'د':'m'} ${esc(t('locked_msg2'))}</div>
        <button class="btn btn-ghost" style="margin-top:16px;" id="backHomeBtn">${esc(t('back_home'))}</button>`;
        document.getElementById('backHomeBtn').addEventListener('click', ()=>{ screen='home'; render(); });
      } else {
        area.innerHTML = `<button class="btn btn-primary" id="retryBtn">${esc(t('retry_btn'))}</button>
        <button class="btn btn-ghost" style="margin-top:12px;" id="backHomeBtn2">${esc(t('back_home'))}</button>`;
        document.getElementById('retryBtn').addEventListener('click', ()=>{ screen='rules'; render(); });
        document.getElementById('backHomeBtn2').addEventListener('click', ()=>{ screen='home'; render(); });
      }
    }
  }

  else if(screen === 'info'){
    document.getElementById('sendInfoBtn').addEventListener('click', async ()=>{
      const fname = document.getElementById('fFname').value.trim();
      const lname = document.getElementById('fLname').value.trim();
      const bdate = document.getElementById('fBdate').value;
      const dsc = document.getElementById('fDiscord').value.trim();
      const steam = document.getElementById('fSteam').value.trim();
      const statusEl = document.getElementById('sendStatus');
      if(!fname || !lname || !bdate || !dsc || !steam){
        statusEl.innerHTML = `<div class="warn-banner">${esc(t('need_all_fields'))}</div>`;
        return;
      }
      statusEl.innerHTML = `<div class="helper-text">${esc(t('loading'))}</div>`;
      const ok = await sendToDiscord({fname,lname,bdate,dsc,steam});
      if(ok){
        statusEl.innerHTML = `<div class="lock-banner" style="border-color:rgba(47,212,153,0.4);color:var(--success);background:rgba(47,212,153,0.1);">✅ ${esc(t('sent_ok'))}</div>`;
        await setAttempt(discordId, {failCount:0, lockedUntil:0, passed:true});
      } else {
        statusEl.innerHTML = `<div class="warn-banner">${esc(t('sent_fail'))}</div>`;
      }
    });
  }

  else if(screen === 'adminLogin'){
    document.getElementById('adminBackBtn').addEventListener('click', ()=>{ screen='home'; render(); });
    document.getElementById('adminLoginBtn').addEventListener('click', async ()=>{
      const pass = document.getElementById('adminPassInput').value;
      const hash = await sha256(pass);
      if(hash === config.adminPassHash){
        adminAuthed = true;
        screen = 'adminPanel';
        render();
      } else {
        document.getElementById('adminLoginErr').textContent = t('admin_wrong_pass');
      }
    });
  }

  else if(screen === 'adminPanel'){
    document.getElementById('adminLogoutBtn').addEventListener('click', ()=>{
      adminAuthed = false; screen='home'; render();
    });
    document.querySelectorAll('.admin-tab').forEach(tab=>{
      tab.addEventListener('click', ()=>{ adminTab = tab.dataset.tab; render(); });
    });
    const bodyEl = document.getElementById('adminBody');
    if(adminTab === 'rules'){
      bodyEl.innerHTML = renderAdminRulesTab();
      document.getElementById('cfgLogo').addEventListener('input', (e)=>{
        document.getElementById('logoPreview').src = e.target.value.trim();
      });
      document.getElementById('saveRulesBtn').addEventListener('click', async ()=>{
        config.rules.ar = document.getElementById('rulesAr').value;
        config.rules.fr = document.getElementById('rulesFr').value;
        config.rules.en = document.getElementById('rulesEn').value;
        config.webhookUrl = document.getElementById('cfgWebhook').value.trim();
        config.logoUrl = document.getElementById('cfgLogo').value.trim();
        config.passMark = parseInt(document.getElementById('cfgPassmark').value,10) || 17;
        config.totalTimeSeconds = parseInt(document.getElementById('cfgTime').value,10) || 120;
        config.maxAttempts = parseInt(document.getElementById('cfgAttempts').value,10) || 3;
        config.cooldownHours = parseFloat(document.getElementById('cfgCooldown').value) || 24;
        const newPass = document.getElementById('cfgNewPass').value;
        if(newPass && newPass.trim().length>0){
          config.adminPassHash = await sha256(newPass.trim());
        }
        await saveConfig();
        showToast(t('saved_toast'));
      });
    } else if(adminTab === 'rprules'){
      bodyEl.innerHTML = renderAdminRpRulesTab();
      document.getElementById('saveRpRulesBtn').addEventListener('click', async ()=>{
        config.rpRules.ar = document.getElementById('rpRulesAr').value;
        config.rpRules.fr = document.getElementById('rpRulesFr').value;
        config.rpRules.en = document.getElementById('rpRulesEn').value;
        await saveConfig();
        showToast(t('saved_toast'));
      });
    } else if(adminTab === 'terms'){
      bodyEl.innerHTML = renderAdminTermsTab();
      document.getElementById('saveTermsBtn').addEventListener('click', async ()=>{
        config.serverTerms.ar = document.getElementById('termsAr').value;
        config.serverTerms.fr = document.getElementById('termsFr').value;
        config.serverTerms.en = document.getElementById('termsEn').value;
        await saveConfig();
        showToast(t('saved_toast'));
      });
    } else if(adminTab === 'questions'){
      bodyEl.innerHTML = renderAdminQuestionsTab();
      document.getElementById('saveQBtn').addEventListener('click', async ()=>{
        const text = document.getElementById('newQText').value.trim();
        const opts = [0,1,2,3].map(i=>document.getElementById('newQOpt'+i).value.trim());
        const correctRadio = document.querySelector('input[name=newQCorrect]:checked');
        const correct = correctRadio ? parseInt(correctRadio.value,10) : 0;
        if(!text || opts.some(o=>!o)){ showToast(t('need_all_fields')); return; }
        if(editingQuestionId){
          const idx = questions.findIndex(qq=>qq.id===editingQuestionId);
          if(idx>=0) questions[idx] = {id:editingQuestionId, text, options:opts, correct};
          editingQuestionId = null;
        } else {
          questions.push({id:cryptoId(), text, options:opts, correct});
        }
        await saveQuestions();
        showToast(t('saved_toast'));
        render();
      });
      const cancelBtn = document.getElementById('cancelEditBtn');
      if(cancelBtn) cancelBtn.addEventListener('click', ()=>{ editingQuestionId=null; render(); });
      document.querySelectorAll('[data-edit]').forEach(b=>{
        b.addEventListener('click', ()=>{ editingQuestionId = b.dataset.edit; render(); });
      });
      document.querySelectorAll('[data-del]').forEach(b=>{
        b.addEventListener('click', async ()=>{
          questions = questions.filter(qq=>qq.id!==b.dataset.del);
          await saveQuestions();
          render();
        });
      });
    } else if(adminTab === 'attempts'){
      bodyEl.innerHTML = `<div class="helper-text">${esc(t('loading'))}</div>`;
      const list = await listAllAttempts();
      bodyEl.innerHTML = renderAdminAttemptsTab(list);
    }
  }
}

/* ============================= QUIZ LOGIC ============================= */
function shuffleQuestionOptions(qq){
  const order = shuffle([0,1,2,3]); // order[newPos] = oldIndex
  const newOptions = order.map(oldIdx => qq.options[oldIdx]);
  const newCorrect = order.indexOf(qq.correct);
  return { id: qq.id, text: qq.text, options: newOptions, correct: newCorrect };
}

function allQuestionsAnswered(){
  return quizSet.every(qq => selected[qq.id] !== undefined || skippedId === qq.id);
}

async function beginQuiz(){
  const count = Math.min(20, questions.length);
  quizSet = shuffle(questions).slice(0, count).map(shuffleQuestionOptions);
  selected = {};
  skippedId = null;
  skipUsed = false;
  timeLeft = config.totalTimeSeconds;
  screen = 'quiz';
  await render();
  startTimer();
  enableCheatGuard();
}

function startTimer(){
  clearInterval(timerHandle);
  timerHandle = setInterval(()=>{
    timeLeft--;
    const timerEl = document.querySelector('.timer');
    if(timerEl){
      timerEl.textContent = fmtTime(Math.max(timeLeft,0));
      timerEl.classList.toggle('low', timeLeft<=15);
    }
    if(timeLeft<=0){
      clearInterval(timerHandle);
      finishQuiz('timeout');
    }
  }, 1000);
}

function enableCheatGuard(){
  cheatGuardActive = true;
}
function disableCheatGuard(){
  cheatGuardActive = false;
}
document.addEventListener('visibilitychange', ()=>{
  if(cheatGuardActive && document.hidden && screen==='quiz'){
    finishQuiz('cheat');
  }
});
window.addEventListener('blur', ()=>{
  if(cheatGuardActive && screen==='quiz'){
    finishQuiz('cheat');
  }
});

async function finishQuiz(reason){
  clearInterval(timerHandle);
  disableCheatGuard();
  let score = 0;
  if(reason !== 'cheat'){
    quizSet.forEach(qq=>{
      if(skippedId === qq.id){ score++; return; } // free pass counts as correct
      if(selected[qq.id] === qq.correct) score++;
    });
  }
  lastScore = score;
  lastReason = reason;
  lastPass = reason !== 'cheat' && score >= (config.passMark||17);

  const att = await getAttempt(discordId);
  if(!lastPass){
    att.failCount = (att.failCount||0) + 1;
    if(att.failCount >= (config.maxAttempts||3)){
      att.lockedUntil = Date.now() + (config.cooldownHours||24)*3600000;
      att.failCount = 0;
    }
    await setAttempt(discordId, att);
  }

  screen = 'result';
  render();
}

/* ============================= DISCORD WEBHOOK ============================= */
async function sendToDiscord(info){
  if(!config.webhookUrl){ return false; }

  const payload = {
    username: 'Dz Complex RP — Interview Bot',
    embeds: [{
      title: lastPass ? '✅ New Application — PASSED' : '❌ New Application — FAILED',
      color: lastPass ? 0x2fd499 : 0xff5470,
      fields: [
        { name: 'Name', value: `${info.fname} ${info.lname}`, inline: true },
        { name: 'Date of birth', value: info.bdate, inline: true },
        { name: 'Discord ID', value: info.dsc, inline: true },
        { name: 'Steam profile', value: info.steam, inline: false },
        { name: 'Score', value: `${lastScore}/20`, inline: true },
        { name: 'Result', value: lastPass ? 'PASSED ✅' : 'FAILED ❌', inline: true }
      ],
      timestamp: new Date().toISOString()
    }]
  };

  try{
    const res = await fetch(config.webhookUrl, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    return res.ok;
  }catch(e){
    console.error('Discord webhook error', e);
    return false;
  }
}

  await initConfig();
  await initQuestions();
  await render();
}
main();
